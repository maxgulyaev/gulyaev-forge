# MCP Server Registry
# Known MCP servers that can enhance pipeline stages

# === VERIFIED & RECOMMENDED ===

- name: context7
  type: mcp
  description: Pulls up-to-date library/framework documentation into agent context
  url: https://github.com/upstash/context7
  stages: [architecture, implementation]
  verdict: adopt
  install: "npx @upstash/context7-mcp"
  notes: "Eliminates hallucinated API calls from outdated training data"

- name: playwright
  type: mcp
  description: Browser automation — navigate, click, screenshot, test user flows
  url: https://github.com/anthropics/anthropic-mcp-servers
  stages: [qa, design]
  verdict: adopt
  install: "npx @anthropic-ai/mcp-server-playwright"
  notes: "Core tool for automated QA stage. Also useful for visual validation in Design."

- name: github
  type: mcp
  description: GitHub API — issues, PRs, project boards, code search
  url: https://github.com/modelcontextprotocol/servers
  stages: [strategy, discovery, implementation]
  verdict: adopt
  install: "npx @modelcontextprotocol/server-github"
  env: { GITHUB_PERSONAL_ACCESS_TOKEN: "..." }
  notes: "Spec-to-issue bridge. Track pipeline state via GitHub Projects."

- name: git
  type: mcp
  description: Git operations — commit history, branch context, diffs
  url: https://github.com/modelcontextprotocol/servers
  stages: [implementation, staging-deploy]
  verdict: assess
  install: "npx @modelcontextprotocol/server-git"
  notes: "Claude Code already has native git support. Assess if MCP adds value."

- name: figma
  type: mcp
  description: Official Figma MCP — read designs, frames, components, design tokens
  url: https://help.figma.com/hc/en-us/articles/32132100833559-Guide-to-the-Figma-MCP-server
  stages: [design]
  verdict: adopt
  config: '{ "type": "http", "url": "https://mcp.figma.com/mcp" }'
  notes: "Remote OAuth — no token needed, auth via browser. Adopted 2026-03-10."

- name: sentry
  type: mcp
  description: Error tracking — issues, stack traces, user impact, release health
  url: https://github.com/getsentry/sentry-mcp
  stages: [tech-monitoring, qa]
  verdict: hold
  install: "npx @sentry/mcp-server"
  notes: "Hold — Spodi uses custom monitoring in admin panel, not Sentry. Re-evaluate when/if adopting Sentry."

