# Project Context Template
# Copy to: <project-root>/.forge/config.yaml
# Fill in project-specific values

project:
  name: ""                    # e.g. "example-product"
  description: ""             # One-line description
  stage: "mvp"                # mvp | growth | scale | mature
  repo: ""                    # GitHub URL

agents:                       # Which AI agents are used
  - claude-code
  # - cursor
  # - codex
  # - windsurf

stack:
  backend: []                 # e.g. [go, fiber, postgresql, redis]
  frontend: []                # e.g. [nextjs, react, tailwind]
  mobile: []                  # e.g. [swiftui, swiftdata]
  infra: []                   # e.g. [docker, yandex-cloud]
  ai: []                      # e.g. [python, fastapi, gemini]

tracking:
  provider: "github"          # github | linear | jira | none
  project_board: true         # auto-add issues to project board
  labels:
    stage_prefix: "stage/"    # stage/prd, stage/implementation, etc.
    priority_prefix: "p"      # p0, p1, p2

deploy:
  current: "single_vm"        # single_vm | blue_green | canary_alb | kubernetes
  environments:
    staging: ""               # URL or description
    production: ""            # URL or description

metrics:
  baseline: ""                # Path to metrics baseline doc
  analytics_provider: ""      # posthog | amplitude | custom
  monitoring_provider: ""     # sentry | grafana | custom

# Optional QA tool registry.
# Shape is generic: qa_tools.<tool_name>
# Current common use:
# qa_tools:
#   playwright_mcp:
#     enabled: true
#     use_for: web_feature_qa,web_bugfix_qa,web_release_smoke
#     scope_paths: apps/web
qa_tools: {}

# Optional distribution/release surfaces.
# Shape is generic: release_targets.<target_name>
# Current common uses:
# release_targets:
#   ios_testflight:
#     platform: ios
#     channel: testflight
#     deploy_stage: canary_deploy
#     runbook: CLAUDE.md#testflight--ios-distribution
#     scope_paths: apps/ios
#   ios_app_store:
#     platform: ios
#     channel: app_store
#     deploy_stage: canary_deploy
#     runbook: CLAUDE.md#testflight--ios-distribution
#     scope_paths: apps/ios
#   web_production:
#     platform: web
#     channel: production
#     deploy_stage: canary_deploy
#     runbook: CLAUDE.md#web--production-deploy
#     scope_paths: apps/web,apps/api,deploy,migrations
#   android_internal:
#     platform: android
#     channel: play_internal
#     deploy_stage: canary_deploy
#     runbook: docs/release/android-internal.md
#     scope_paths: apps/android
release_targets: {}

# Optional external agents for specific handoffs.
# Shape is generic: stage_agents.<stage>.<role>
# Transport and source-of-truth rules:
# - stage_agents are execution helpers only
# - issue trail, approved artifacts, and `.forge/pipeline-state.yaml` stay the source of truth
# - transport/runtime for a secondary agent must never own stage transitions or gate decisions
# Current runtime support:
# - `transport: local_cli` only
# Future transport classes may include:
# - `mcp` for tool-exposed agent runtimes
# - `acp_a2a` for remote agent-to-agent transport
# Current common use:
# stage_agents:
#   code_review:
#     reviewer:
#       transport: local_cli
#       adapter: codex-review
#       prompt_file: .forge/reviewers/code-review.md
# Future-looking example (not yet implemented by forge runtime):
# stage_agents:
#   qa:
#     reviewer:
#       transport: acp_a2a
#       endpoint: https://agents.example.com/qa-reviewer
#       agent_id: qa-reviewer-v1
stage_agents: {}

# Which files to inject as context B for each pipeline stage
# Use:
# - required: must exist or the stage cannot start
# - if_exists: include when present
# - search: glob patterns for role-specific discovery
